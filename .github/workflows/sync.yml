name: Bisync Drive <-> Dropbox

on:
  repository_dispatch:
    types: [gdrive-changed, dropbox-changed]
  workflow_dispatch: {}
  schedule:
    # Safety net in case a webhook is missed or a Drive watch channel lapses.
    - cron: '17 */6 * * *'

concurrency:
  group: bisync
  cancel-in-progress: false

jobs:
  bisync:
    runs-on: ubuntu-latest
    steps:
      - name: Restore rclone bisync state
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/rclone/bisync
          key: rclone-bisync-state-${{ github.run_id }}
          restore-keys: |
            rclone-bisync-state-

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Write rclone config
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" | base64 -d > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Check whether this is the first-ever run
        id: state
        run: |
          if [ -z "$(ls -A ~/.cache/rclone/bisync 2>/dev/null)" ]; then
            echo "needs_resync=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_resync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initial resync (first run only)
        if: steps.state.outputs.needs_resync == 'true'
        run: |
          rclone bisync "gdrive:${{ vars.GDRIVE_FOLDER }}" "dropbox:${{ vars.DROPBOX_FOLDER }}" \
            --resync -v

      - name: Bisync
        if: steps.state.outputs.needs_resync == 'false'
        run: |
          rclone bisync "gdrive:${{ vars.GDRIVE_FOLDER }}" "dropbox:${{ vars.DROPBOX_FOLDER }}" \
            -v --max-delete 10 --recover

      - name: Save rclone bisync state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/rclone/bisync
          key: rclone-bisync-state-${{ github.run_id }}
